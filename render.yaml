services:
  - type: web
    name: kplor-insight-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
